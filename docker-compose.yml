services:
  postgres:
    image: postgres:16-alpine
    container_name: quoteyouros_db
    environment:
      POSTGRES_DB: ${DB_NAME:-quoteyouros}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quoteyouros_network

  backend:
    image: lyandoo/quoteyouros-backend:v1.0.0
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quoteyouros_backend
    ports:
      - "${SERVER_PORT:-8000}:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-quoteyouros}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      APP_ENV: ${APP_ENV:-development}
    volumes:
      - ./storage/resumes:/root/storage/resumes
      - ./storage/gallery:/root/storage/gallery
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quoteyouros_network

volumes:
  postgres_data:

networks:
  quoteyouros_network:
    driver: bridge
